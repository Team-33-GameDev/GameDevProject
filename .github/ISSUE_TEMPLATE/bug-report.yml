name: "Bug Report"
description: "Report a crash, logic error, or visual glitch"
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: "Clear summary of the issue."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment & Engine Version
      placeholder: "e.g., Windows 10 or 11, Arch linux, Godot 4.6"
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Acceptance Criteria for the Fix
      description: "Verification conditions for the fix."
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ### Attachments
        **Provide visual evidence.** Drag and drop screenshots, videos, or engine log files (.log) here. Visual bugs require visual proof.