name: Lychee Link Checker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Check all markdown files in repo
          args: --verbose --no-progress '**/*.md'
          fail: true