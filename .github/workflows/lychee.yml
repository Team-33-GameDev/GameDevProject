name: Lychee Link Checker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --exclude "^file://"
            --exclude "https://github.com/orgs/Team-33-GameDev/projects/.*"
            --exclude "https://gitlab.pg.innopolis.university/.*"
            --max-redirects 5
            '**/*.md'
          fail: true
